apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: cloudstudents
  name: deployment-course-krishna

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: app-course-krishna
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: app-course-krishna
    spec:
      containers:
        - name: app-course-krishna
          image: 991524241826.dkr.ecr.ap-south-2.amazonaws.com/cloudstudnets/krishna-course:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001

---
apiVersion: v1
kind: Service
metadata:
  namespace: cloudstudents
  name: service-course-krishna

spec:
  selector:
    app.kubernetes.io/name: app-course-krishna
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
  type: NodePort

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: cloudstudents
  name: ingress-course-krishna
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-course-krishna
                port:
                  number: 3001
